<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="170" y1="120" x2="860" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F5FB8"/>
      <stop offset="0.55" stop-color="#0A4A97"/>
      <stop offset="1" stop-color="#062D66"/>
    </linearGradient>

    <linearGradient id="metal" x1="250" y1="250" x2="760" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFE"/>
      <stop offset="0.18" stop-color="#E7EEF7"/>
      <stop offset="0.52" stop-color="#C3CFDD"/>
      <stop offset="0.8" stop-color="#A8B6C7"/>
      <stop offset="1" stop-color="#8E9CAF"/>
    </linearGradient>

    <linearGradient id="metalEdge" x1="330" y1="220" x2="760" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#C0CBD8" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="shadowBg" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#00132D" flood-opacity="0.35"/>
    </filter>

    <filter id="shadowLogo" x="90" y="110" width="844" height="724" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#021A41" flood-opacity="0.35"/>
    </filter>

    <clipPath id="rightFaceClip">
      <path d="M430 307L796 398V695L430 780V307Z"/>
    </clipPath>
  </defs>

  <g filter="url(#shadowBg)">
    <rect x="44" y="44" width="936" height="936" rx="176" fill="url(#bg)"/>
    <rect x="44" y="44" width="936" height="936" rx="176" fill="url(#bg)"/>
    <rect x="44" y="44" width="936" height="936" rx="176" stroke="rgba(255,255,255,0.14)"/>
  </g>

  <g opacity="0.18">
    <ellipse cx="285" cy="200" rx="240" ry="110" fill="#7FD0FF"/>
  </g>

  <g filter="url(#shadowLogo)">
    <!-- Left rear slab -->
    <path d="M188 382L276 349V687L188 653V382Z" fill="url(#metal)"/>
    <path d="M188 382L276 349V687L188 653V382Z" stroke="url(#metalEdge)" stroke-width="2"/>

    <!-- Left front slab -->
    <path d="M305 328L411 289V734L305 696V328Z" fill="url(#metal)"/>
    <path d="M305 328L411 289V734L305 696V328Z" stroke="url(#metalEdge)" stroke-width="2"/>

    <!-- Right face -->
    <path d="M430 307L796 398V695L430 780V307Z" fill="url(#metal)"/>
    <path d="M430 307L796 398V695L430 780V307Z" stroke="url(#metalEdge)" stroke-width="2"/>

    <!-- Subtle top highlight -->
    <path d="M430 307L796 398" stroke="white" stroke-opacity="0.65" stroke-width="3" stroke-linecap="round"/>
    <path d="M305 328L411 289" stroke="white" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>
    <path d="M188 382L276 349" stroke="white" stroke-opacity="0.4" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Vents -->
    <g clip-path="url(#rightFaceClip)">
      <rect x="500" y="360" width="30" height="318" rx="15" fill="#0A4A97"/>
      <rect x="600" y="385" width="30" height="292" rx="15" fill="#0A4A97"/>
      <rect x="695" y="410" width="30" height="255" rx="15" fill="#0A4A97"/>
      <rect x="780" y="430" width="30" height="205" rx="15" fill="#0A4A97"/>
    </g>
  </g>
</svg>
